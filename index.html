<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mon Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D12;
    --surface:#131820;
    --surface-2:#1B222C;
    --border:#262E3A;
    --text:#ECEFF3;
    --text-dim:#7C879A;
    --accent:#F2A93B;
    --accent-2:#D17829;
    --green:#34D399;
    --red:#FB6B6B;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100%;overflow-x:hidden;}
  body{padding-bottom:calc(96px + var(--safe-bottom));}
  ::selection{background:var(--accent);color:#0A0D12;}
  .num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  button{font-family:inherit;}

  /* HEADER */
  header{
    position:fixed; top:0; left:0; right:0; z-index:50;
    padding:calc(14px + var(--safe-top)) 16px 14px;
    background:linear-gradient(180deg, rgba(10,13,18,.97) 70%, rgba(10,13,18,.85));
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  }
  .hdr-left{display:flex; flex-direction:column; gap:2px; min-width:0;}
  .hdr-title-row{display:flex; align-items:center; gap:8px;}
  .hdr-title{font-size:15px; font-weight:600; color:var(--text-dim); letter-spacing:.2px;}
  .gear-btn{
    width:26px;height:26px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
    font-size:14px; flex-shrink:0;
  }
  .btc-price-row{display:flex; align-items:baseline; gap:8px; margin-top:2px;}
  .btc-price{font-size:21px; font-weight:700; transition:color .35s ease, text-shadow .35s ease;}
  .btc-price.flash-up{color:var(--green); text-shadow:0 0 14px rgba(52,211,153,.45);}
  .btc-price.flash-down{color:var(--red); text-shadow:0 0 14px rgba(251,107,107,.45);}
  .btc-sub{font-size:12px; color:var(--text-dim); margin-top:1px;}
  .btc-sub b{color:var(--text); font-weight:600;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green); display:inline-block; margin-right:5px; box-shadow:0 0 0 0 rgba(52,211,153,.6); animation:pulse 2s infinite;}
  .live-dot.off{background:var(--text-dim); animation:none; box-shadow:none;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);}70%{box-shadow:0 0 0 6px rgba(52,211,153,0);}100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}}

  .bilan-bubble{
    flex-shrink:0; min-width:90px; border-radius:16px; padding:9px 12px;
    background:var(--surface-2); border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  }
  .bilan-label{font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-dim); font-weight:600;}
  .bilan-value{font-size:16px; font-weight:700;}
  .bilan-value.pos{color:var(--green);}
  .bilan-value.neg{color:var(--red);}

  /* MONTH BUBBLE */
  .month-bubble{
    width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    padding:13px 15px; margin-bottom:16px; text-align:left; color:inherit;
    -webkit-appearance:none; appearance:none;
  }
  .month-bubble:active{background:var(--surface-2);}
  .month-bubble-left{display:flex; flex-direction:column; gap:3px; min-width:0;}
  .month-bubble-sub{font-size:13px; color:var(--text-dim); font-weight:600;}
  .month-bubble-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .month-bubble-value{font-size:17px; font-weight:700;}
  .month-bubble-value.pos{color:var(--green);}
  .month-bubble-value.neg{color:var(--red);}
  .month-bubble-chevron{font-size:20px; color:var(--text-dim);}

  /* MONTH VIEW (full screen, swipeable) */
  .month-view{
    position:fixed; inset:0; z-index:65; background:var(--bg);
    transform:translateY(100%); transition:transform .32s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
  }
  .month-view.show{transform:translateY(0);}
  .month-view-header{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:calc(14px + var(--safe-top)) 14px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .month-back{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:20px; display:flex; align-items:center; justify-content:center;
  }
  .month-view-title{font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700;}
  .month-swipe-area{flex:1; overflow:hidden; position:relative; touch-action:pan-y;}
  .month-view-content{height:100%; overflow-y:auto; padding:16px 16px calc(24px + var(--safe-bottom));}
  .month-hint{text-align:center; font-size:11.5px; color:var(--text-dim); margin-bottom:14px;}
  .month-stats-row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .month-bilan-card{
    background:var(--surface-2); border:1px solid var(--border); border-radius:18px; padding:18px;
    margin-bottom:16px; display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  .month-bilan-card .lab{font-size:11px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.6px;}
  .month-bilan-card .val{font-size:26px; font-weight:700;}

  /* MAIN */
  main{padding:calc(var(--header-h, 132px) + 14px) 16px 24px;}
  .section-title{font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-dim); font-weight:600; margin:18px 2px 10px;}
  .section-title:first-child{margin-top:0;}

  .stats-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .stat-card{
    background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:14px;
  }
  .stat-card .lab{font-size:11px; color:var(--text-dim); font-weight:600;}
  .stat-card .val{font-size:18px; font-weight:700; margin-top:4px;}
  .stat-card .val.green{color:var(--green);}
  .stat-card .val.red{color:var(--red);}

  /* HISTORY LIST */
  .tx-list{display:flex; flex-direction:column; gap:8px;}
  .empty-state{
    text-align:center; padding:40px 20px; color:var(--text-dim); font-size:14px;
    background:var(--surface); border:1px dashed var(--border); border-radius:18px;
  }
  .tx-item{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px 12px;
  }
  .tx-icon{
    width:42px;height:42px;border-radius:13px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:19px; background:var(--surface-2);
  }
  .tx-mid{flex:1; min-width:0;}
  .tx-desc{font-size:14.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tx-meta{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .tx-amount{font-size:15px; font-weight:700; white-space:nowrap; text-align:right;}
  .tx-amount.green{color:var(--green);}
  .tx-amount.red{color:var(--red);}
  .tx-amount.accent{color:var(--accent);}
  .tx-del{
    width:30px;height:30px;border-radius:9px;border:none;background:transparent;color:var(--text-dim);
    font-size:17px; flex-shrink:0;
  }
  .tx-del:active{background:var(--surface-2); color:var(--red);}

  /* FAB */
  .fab{
    position:fixed; right:18px; bottom:calc(22px + var(--safe-bottom)); z-index:40;
    width:62px;height:62px;border-radius:20px;border:none;
    background:linear-gradient(145deg, var(--accent), var(--accent-2));
    color:#1A1206; font-size:30px; font-weight:700; line-height:1;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 26px -6px rgba(242,169,59,.55), 0 2px 6px rgba(0,0,0,.4);
  }
  .fab:active{transform:scale(.93);}

  /* SHEET / MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(5,7,10,.6); backdrop-filter:blur(2px);
    z-index:60; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61;
    background:var(--surface); border-top:1px solid var(--border);
    border-radius:24px 24px 0 0; padding:14px 18px calc(22px + var(--safe-bottom));
    transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
    max-height:88vh; overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle{width:38px;height:4px;border-radius:3px;background:var(--border); margin:0 auto 14px;}
  .sheet-title{font-size:19px; font-weight:700; margin-bottom:16px;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px; letter-spacing:.2px;}
  .field input, .field select, .field textarea{
    width:100%; padding:14px 14px; border-radius:14px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-size:15.5px; font-family:'Inter',sans-serif;
    appearance:none; -webkit-appearance:none;
  }
  .field input.num, .field select.num{font-family:'JetBrains Mono',monospace;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .seg{display:flex; gap:8px;}
  .seg button{
    flex:1; padding:13px 4px; border-radius:14px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text-dim); font-size:13.5px; font-weight:600;
  }
  .seg button.active{background:rgba(242,169,59,.12); border-color:var(--accent); color:var(--accent);}

  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:16px; margin-top:6px;
    background:linear-gradient(145deg, var(--accent), var(--accent-2)); color:#1A1206;
    font-size:16px; font-weight:700;
  }
  .btn-primary:active{transform:scale(.985);}
  .btn-ghost{
    width:100%; padding:14px; border:1px solid var(--border); border-radius:16px; margin-top:10px;
    background:transparent; color:var(--text-dim); font-size:14.5px; font-weight:600;
  }

  .toast{
    position:fixed; left:50%; bottom:calc(100px + var(--safe-bottom)); transform:translate(-50%,8px);
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:11px 18px; border-radius:30px; font-size:13.5px; font-weight:600;
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:80; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translate(-50%,0);}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
</style>
</head>
<body>

<header id="siteHeader">
  <div class="hdr-left">
    <div class="hdr-title-row">
      <span class="hdr-title">Mon Portfolio</span>
      <button class="gear-btn" id="openSettings" aria-label="Paramètres">⚙</button>
    </div>
    <div class="btc-price-row">
      <span class="btc-price num" id="btcPrice">--&nbsp;€</span>
    </div>
    <div class="btc-sub"><span class="live-dot" id="liveDot"></span><span id="btcHolding">Mes BTC : <b class="num">--</b></span></div>
  </div>
  <div class="bilan-bubble">
    <span class="bilan-label">Bilan annuel</span>
    <span class="bilan-value num" id="bilanValue">0 €</span>
  </div>
</header>

<main id="mainContent">
  <button class="month-bubble" id="openMonth" type="button">
    <div class="month-bubble-left">
      <span class="bilan-label">Bilan du mois</span>
      <span class="month-bubble-sub" id="monthBubbleLabel">--</span>
    </div>
    <div class="month-bubble-right">
      <span class="month-bubble-value num" id="monthBubbleValue">0 €</span>
      <span class="month-bubble-chevron">›</span>
    </div>
  </button>

  <div class="section-title">Aperçu</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="lab">Rentrées (année)</div>
      <div class="val green num" id="statIn">0 €</div>
    </div>
    <div class="stat-card">
      <div class="lab">Dépenses (année)</div>
      <div class="val red num" id="statOut">0 €</div>
    </div>
  </div>

  <div class="section-title">Historique</div>
  <div class="tx-list" id="txList"></div>
</main>

<button class="fab" id="openForm" aria-label="Nouvelle entrée">+</button>

<div class="overlay" id="overlay"></div>

<!-- FORM SHEET -->
<div class="sheet" id="formSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Nouvelle entrée</div>
  <form id="txForm">
    <div class="field">
      <label>Date</label>
      <input type="date" id="f_date" required>
    </div>
    <div class="field">
      <label>Type</label>
      <div class="seg" id="f_type">
        <button type="button" data-val="Dépense" class="active">Dépense</button>
        <button type="button" data-val="Rentrée">Rentrée</button>
        <button type="button" data-val="Investissement">Investissement</button>
      </div>
    </div>
    <div class="field">
      <label>Catégorie</label>
      <select id="f_category"></select>
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" id="f_desc" placeholder="Ex : Courses de la semaine" maxlength="60" required>
    </div>
    <div class="field">
      <label id="f_amount_label">Montant (€)</label>
      <input type="number" inputmode="decimal" step="0.01" min="0" class="num" id="f_amount" placeholder="0.00" required>
    </div>
    <div class="field" id="f_btcqty_wrap" style="display:none;">
      <label>Quantité BTC achetée</label>
      <input type="number" inputmode="decimal" step="0.00000001" min="0" class="num" id="f_btcqty" placeholder="0.00000000">
    </div>
    <button type="submit" class="btn-primary">Enregistrer</button>
    <button type="button" class="btn-ghost" id="cancelForm">Annuler</button>
  </form>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Paramètres</div>
  <div class="field">
    <label>Quantité de BTC possédée</label>
    <input type="number" inputmode="decimal" step="0.00000001" min="0" class="num" id="s_btcqty" placeholder="0.00000000">
  </div>
  <button type="button" class="btn-primary" id="saveSettings">Enregistrer</button>
  <button type="button" class="btn-ghost" id="cancelSettings">Fermer</button>
</div>

<div class="toast" id="toast"></div>

<!-- MONTH VIEW -->
<div class="month-view" id="monthView">
  <div class="month-view-header">
    <button class="month-back" id="closeMonth" aria-label="Retour">‹</button>
    <div class="month-view-title" id="monthViewTitle">--</div>
    <div style="width:34px"></div>
  </div>
  <div class="month-swipe-area" id="monthSwipeArea">
    <div class="month-view-content" id="monthViewContent"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- CONSTANTS ----------
  var CATEGORIES = {
    "Dépense": [["Alimentation","🍔"],["Transport","🚌"],["Logement","🏠"],["Santé","🏥"],["Loisirs","🎮"],["Voyage","✈️"],["Abonnements","📱"],["Autre","🔘"]],
    "Rentrée": [["Salaire","💼"],["Freelance","💻"],["Bourse d'études","🎓"],["Cadeau","🎁"],["Remboursement","↩️"],["Autre","🔘"]],
    "Investissement": [["Crypto","₿"],["Bourse","📈"],["Immobilier","🏘️"],["Autre","🔘"]]
  };
  var LS_TX = "mp_transactions";
  var LS_BTCQTY = "mp_btc_qty";
  var LS_PRICE_CACHE = "mp_price_cache";
  var MONTH_NAMES = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

  // ---------- STATE ----------
  var state = {
    transactions: [],
    btcQty: 0,
    btcPrice: null,
    priceIsLive: false
  };

  // ---------- STORAGE ----------
  function loadState(){
    try{
      var tx = JSON.parse(localStorage.getItem(LS_TX) || "[]");
      state.transactions = Array.isArray(tx) ? tx : [];
    }catch(e){ state.transactions = []; }
    var qty = parseFloat(localStorage.getItem(LS_BTCQTY));
    state.btcQty = isNaN(qty) ? 0 : qty;
    try{
      var cache = JSON.parse(localStorage.getItem(LS_PRICE_CACHE) || "null");
      if(cache && cache.price) state.btcPrice = cache.price;
    }catch(e){}
  }
  function saveTx(){ localStorage.setItem(LS_TX, JSON.stringify(state.transactions)); }
  function saveBtcQty(){ localStorage.setItem(LS_BTCQTY, String(state.btcQty)); }
  function cachePrice(p){ localStorage.setItem(LS_PRICE_CACHE, JSON.stringify({price:p, ts:Date.now()})); }

  // ---------- FORMAT HELPERS ----------
  var eurFmt = new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:2});
  var eurFmt0 = new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0});
  function fmtEur(n){ return eurFmt.format(n); }
  function fmtBtc(n){
    if(n === null || n === undefined || isNaN(n)) return "--";
    var s = n.toFixed(8).replace(/0+$/,'').replace(/\.$/,'');
    if(s === "" || s === "-") s = "0";
    return s + " BTC";
  }
  function fmtDate(iso){
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
  }
  function todayStr(){
    var d = new Date();
    var m = (d.getMonth()+1+"").padStart(2,'0');
    var day = (d.getDate()+"").padStart(2,'0');
    return d.getFullYear()+"-"+m+"-"+day;
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function iconFor(type, cat){
    var list = CATEGORIES[type] || [];
    for(var i=0;i<list.length;i++){ if(list[i][0]===cat) return list[i][1]; }
    return "🔘";
  }

  // ---------- API ----------
  function fetchPrice(){
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur")
      .then(function(r){ if(!r.ok) throw new Error("net"); return r.json(); })
      .then(function(data){
        var p = data && data.bitcoin && data.bitcoin.eur;
        if(typeof p === "number"){
          var prev = state.btcPrice;
          state.btcPrice = p;
          state.priceIsLive = true;
          cachePrice(p);
          renderHeader(prev);
          renderBilan();
        }
      })
      .catch(function(){
        state.priceIsLive = false;
        renderHeader(null);
      });
  }

  // ---------- RENDER ----------
  function renderHeader(prevPrice){
    var priceEl = document.getElementById("btcPrice");
    var dot = document.getElementById("liveDot");
    if(state.btcPrice !== null){
      priceEl.textContent = fmtEur(state.btcPrice);
      priceEl.classList.remove("flash-up","flash-down");
      if(prevPrice !== null && prevPrice !== undefined){
        if(state.btcPrice > prevPrice) priceEl.classList.add("flash-up");
        else if(state.btcPrice < prevPrice) priceEl.classList.add("flash-down");
        setTimeout(function(){ priceEl.classList.remove("flash-up","flash-down"); }, 1200);
      }
    } else {
      priceEl.textContent = "-- €";
    }
    dot.classList.toggle("off", !state.priceIsLive);

    var holdingEl = document.getElementById("btcHolding");
    var totalVal = (state.btcPrice !== null) ? state.btcQty * state.btcPrice : null;
    holdingEl.innerHTML = "Mes BTC : <b class='num'>" + fmtBtc(state.btcQty) + "</b>" +
      (totalVal !== null ? " · <b class='num'>" + fmtEur(totalVal) + "</b>" : "");
  }

  function yearTx(){
    var y = new Date().getFullYear();
    return state.transactions.filter(function(t){ return new Date(t.date+"T00:00:00").getFullYear() === y; });
  }

  function computeMonthStats(year, monthIdx){
    var totalIn = 0, totalOut = 0, evolution = 0;
    var txs = state.transactions.filter(function(t){
      var d = new Date(t.date+"T00:00:00");
      return d.getFullYear() === year && d.getMonth() === monthIdx;
    });
    txs.forEach(function(t){
      if(t.type === "Rentrée") totalIn += t.amount;
      else if(t.type === "Dépense") totalOut += t.amount;
      else if(t.type === "Investissement" && t.category === "Crypto" && t.btcQty && state.btcPrice !== null){
        evolution += (t.btcQty * state.btcPrice) - t.amount;
      }
    });
    return { totalIn: totalIn, totalOut: totalOut, evolution: evolution, bilan: totalIn - totalOut + evolution, txs: txs };
  }

  function renderBilan(){
    var tx = yearTx();
    var totalIn = 0, totalOut = 0, evolution = 0;
    tx.forEach(function(t){
      if(t.type === "Rentrée") totalIn += t.amount;
      else if(t.type === "Dépense") totalOut += t.amount;
      else if(t.type === "Investissement"){
        if(t.category === "Crypto" && t.btcQty && state.btcPrice !== null){
          evolution += (t.btcQty * state.btcPrice) - t.amount;
        }
      }
    });
    var bilan = totalIn - totalOut + evolution;
    var bilanEl = document.getElementById("bilanValue");
    bilanEl.textContent = (bilan >= 0 ? "+" : "") + eurFmt0.format(bilan);
    bilanEl.classList.toggle("pos", bilan >= 0);
    bilanEl.classList.toggle("neg", bilan < 0);

    document.getElementById("statIn").textContent = fmtEur(totalIn);
    document.getElementById("statOut").textContent = fmtEur(totalOut);

    renderMonthBubble();
  }

  function renderTxItemHtml(t){
    var cls = t.type === "Rentrée" ? "green" : (t.type === "Dépense" ? "red" : "accent");
    var sign = t.type === "Rentrée" ? "+" : (t.type === "Dépense" ? "−" : "");
    var metaParts = [fmtDate(t.date), t.category];
    if(t.type === "Investissement" && t.btcQty) metaParts.push(fmtBtc(t.btcQty));
    return '<div class="tx-item" data-id="'+t.id+'">' +
      '<div class="tx-icon">'+iconFor(t.type,t.category)+'</div>' +
      '<div class="tx-mid"><div class="tx-desc">'+escapeHtml(t.description)+'</div>' +
      '<div class="tx-meta">'+metaParts.map(escapeHtml).join(' · ')+'</div></div>' +
      '<div class="tx-amount '+cls+'">'+sign+fmtEur(t.amount)+'</div>' +
      '<button class="tx-del" data-del="'+t.id+'" aria-label="Supprimer">✕</button>' +
      '</div>';
  }

  function renderList(){
    var list = document.getElementById("txList");
    var sorted = state.transactions.slice().sort(function(a,b){
      return b.date.localeCompare(a.date) || (b.createdAt||0) - (a.createdAt||0);
    });
    if(sorted.length === 0){
      list.innerHTML = '<div class="empty-state">Aucune transaction pour le moment.<br>Ajoutez votre première entrée avec le bouton +.</div>';
      return;
    }
    list.innerHTML = sorted.map(renderTxItemHtml).join("");
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function renderAll(){
    renderHeader(null);
    renderBilan();
    renderList();
  }

  // ---------- TOAST ----------
  var toastTimer;
  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 1800);
  }

  // ---------- FORM SHEET LOGIC ----------
  var overlay = document.getElementById("overlay");
  var formSheet = document.getElementById("formSheet");
  var settingsSheet = document.getElementById("settingsSheet");
  var currentType = "Dépense";

  function populateCategories(){
    var sel = document.getElementById("f_category");
    var opts = CATEGORIES[currentType];
    sel.innerHTML = opts.map(function(o){ return '<option value="'+o[0]+'">'+o[1]+' '+o[0]+'</option>'; }).join("");
    toggleBtcField();
  }

  function toggleBtcField(){
    var sel = document.getElementById("f_category");
    var wrap = document.getElementById("f_btcqty_wrap");
    var label = document.getElementById("f_amount_label");
    var show = currentType === "Investissement" && sel.value === "Crypto";
    wrap.style.display = show ? "block" : "none";
    label.textContent = show ? "Montant investi (€)" : "Montant (€)";
  }

  document.querySelectorAll("#f_type button").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll("#f_type button").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      currentType = btn.getAttribute("data-val");
      populateCategories();
    });
  });
  document.getElementById("f_category").addEventListener("change", toggleBtcField);

  function openSheet(sheetEl){
    overlay.classList.add("show");
    sheetEl.classList.add("show");
  }
  function closeSheets(){
    overlay.classList.remove("show");
    formSheet.classList.remove("show");
    settingsSheet.classList.remove("show");
  }
  overlay.addEventListener("click", closeSheets);

  document.getElementById("openForm").addEventListener("click", function(){
    document.getElementById("f_date").value = todayStr();
    document.getElementById("f_desc").value = "";
    document.getElementById("f_amount").value = "";
    document.getElementById("f_btcqty").value = "";
    document.querySelectorAll("#f_type button").forEach(function(b){ b.classList.remove("active"); });
    document.querySelector('#f_type button[data-val="Dépense"]').classList.add("active");
    currentType = "Dépense";
    populateCategories();
    openSheet(formSheet);
  });
  document.getElementById("cancelForm").addEventListener("click", closeSheets);

  document.getElementById("txForm").addEventListener("submit", function(e){
    e.preventDefault();
    var date = document.getElementById("f_date").value || todayStr();
    var category = document.getElementById("f_category").value;
    var description = document.getElementById("f_desc").value.trim();
    var amount = parseFloat(document.getElementById("f_amount").value);
    if(!description || isNaN(amount) || amount < 0){
      showToast("Veuillez vérifier les champs.");
      return;
    }
    var entry = { id: uid(), date: date, type: currentType, category: category, description: description, amount: amount, createdAt: Date.now() };
    if(currentType === "Investissement" && category === "Crypto"){
      var q = parseFloat(document.getElementById("f_btcqty").value);
      if(!isNaN(q) && q > 0) entry.btcQty = q;
    }
    state.transactions.push(entry);
    saveTx();
    renderList();
    renderBilan();
    closeSheets();
    showToast("Entrée enregistrée");
  });

  document.getElementById("txList").addEventListener("click", function(e){
    var delBtn = e.target.closest("[data-del]");
    if(!delBtn) return;
    var id = delBtn.getAttribute("data-del");
    if(confirm("Supprimer cette transaction ?")){
      state.transactions = state.transactions.filter(function(t){ return t.id !== id; });
      saveTx();
      renderList();
      renderBilan();
      showToast("Entrée supprimée");
    }
  });

  // ---------- SETTINGS SHEET ----------
  document.getElementById("openSettings").addEventListener("click", function(){
    document.getElementById("s_btcqty").value = state.btcQty || "";
    openSheet(settingsSheet);
  });
  document.getElementById("cancelSettings").addEventListener("click", closeSheets);
  document.getElementById("saveSettings").addEventListener("click", function(){
    var v = parseFloat(document.getElementById("s_btcqty").value);
    state.btcQty = isNaN(v) ? 0 : v;
    saveBtcQty();
    renderHeader(null);
    renderBilan();
    closeSheets();
    showToast("Paramètres enregistrés");
  });

  // ---------- MONTH BUBBLE & MONTH VIEW ----------
  function renderMonthBubble(){
    var now = new Date();
    var stats = computeMonthStats(now.getFullYear(), now.getMonth());
    document.getElementById("monthBubbleLabel").textContent = MONTH_NAMES[now.getMonth()] + " " + now.getFullYear();
    var el = document.getElementById("monthBubbleValue");
    el.textContent = (stats.bilan >= 0 ? "+" : "") + eurFmt0.format(stats.bilan);
    el.classList.toggle("pos", stats.bilan >= 0);
    el.classList.toggle("neg", stats.bilan < 0);
  }

  var monthState = { date: new Date() };

  function renderMonthView(){
    var y = monthState.date.getFullYear();
    var m = monthState.date.getMonth();
    var stats = computeMonthStats(y, m);
    document.getElementById("monthViewTitle").textContent = MONTH_NAMES[m] + " " + y;
    var html = '<div class="month-hint">‹ Glissez pour changer de mois ›</div>';
    html += '<div class="month-bilan-card"><span class="lab">Bilan du mois</span><span class="val num ' +
      (stats.bilan >= 0 ? "pos" : "neg") + '" style="color:' + (stats.bilan >= 0 ? "var(--green)" : "var(--red)") + '">' +
      (stats.bilan >= 0 ? "+" : "") + fmtEur(stats.bilan) + '</span></div>';
    html += '<div class="month-stats-row"><div class="stat-card"><div class="lab">Rentrées</div><div class="val green num">' +
      fmtEur(stats.totalIn) + '</div></div><div class="stat-card"><div class="lab">Dépenses</div><div class="val red num">' +
      fmtEur(stats.totalOut) + '</div></div></div>';
    if(stats.txs.length === 0){
      html += '<div class="empty-state">Aucune transaction ce mois-ci.</div>';
    } else {
      var sorted = stats.txs.slice().sort(function(a,b){
        return b.date.localeCompare(a.date) || (b.createdAt||0) - (a.createdAt||0);
      });
      html += '<div class="tx-list">' + sorted.map(renderTxItemHtml).join("") + '</div>';
    }
    document.getElementById("monthViewContent").innerHTML = html;
  }

  function shiftMonth(delta){
    monthState.date = new Date(monthState.date.getFullYear(), monthState.date.getMonth() + delta, 1);
    renderMonthView();
  }

  function openMonthView(){
    monthState.date = new Date();
    renderMonthView();
    document.getElementById("monthView").classList.add("show");
  }
  function closeMonthView(){
    document.getElementById("monthView").classList.remove("show");
  }

  document.getElementById("openMonth").addEventListener("click", openMonthView);
  document.getElementById("closeMonth").addEventListener("click", closeMonthView);

  document.getElementById("monthViewContent").addEventListener("click", function(e){
    var delBtn = e.target.closest("[data-del]");
    if(!delBtn) return;
    var id = delBtn.getAttribute("data-del");
    if(confirm("Supprimer cette transaction ?")){
      state.transactions = state.transactions.filter(function(t){ return t.id !== id; });
      saveTx();
      renderList();
      renderBilan();
      renderMonthView();
      showToast("Entrée supprimée");
    }
  });

  // swipe between months
  (function(){
    var area = document.getElementById("monthSwipeArea");
    var content = document.getElementById("monthViewContent");
    var startX = 0, startY = 0, dx = 0, dragging = false;

    area.addEventListener("touchstart", function(e){
      if(e.touches.length !== 1) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0; dragging = true;
      content.style.transition = "none";
    }, {passive:true});

    area.addEventListener("touchmove", function(e){
      if(!dragging) return;
      var curX = e.touches[0].clientX;
      var curY = e.touches[0].clientY;
      var deltaX = curX - startX;
      var deltaY = curY - startY;
      if(Math.abs(deltaY) > Math.abs(deltaX)) return;
      dx = deltaX;
      content.style.transform = "translateX(" + dx + "px)";
    }, {passive:true});

    area.addEventListener("touchend", function(){
      if(!dragging) return;
      dragging = false;
      content.style.transition = "transform .25s ease";
      var threshold = 70;
      if(dx < -threshold){
        content.style.transform = "translateX(-100%)";
        setTimeout(function(){
          shiftMonth(1);
          content.style.transition = "none";
          content.style.transform = "translateX(100%)";
          requestAnimationFrame(function(){
            content.style.transition = "transform .25s ease";
            content.style.transform = "translateX(0)";
          });
        }, 180);
      } else if(dx > threshold){
        content.style.transform = "translateX(100%)";
        setTimeout(function(){
          shiftMonth(-1);
          content.style.transition = "none";
          content.style.transform = "translateX(-100%)";
          requestAnimationFrame(function(){
            content.style.transition = "transform .25s ease";
            content.style.transform = "translateX(0)";
          });
        }, 180);
      } else {
        content.style.transform = "translateX(0)";
      }
    });
  })();

  // ---------- HEADER HEIGHT SYNC (fixes overlap with main content) ----------
  function syncHeaderHeight(){
    var header = document.getElementById("siteHeader");
    if(!header) return;
    document.documentElement.style.setProperty("--header-h", header.offsetHeight + "px");
  }
  syncHeaderHeight();
  window.addEventListener("load", syncHeaderHeight);
  window.addEventListener("resize", syncHeaderHeight);
  if(window.ResizeObserver){
    new ResizeObserver(syncHeaderHeight).observe(document.getElementById("siteHeader"));
  }

  // ---------- INIT ----------
  loadState();
  renderAll();
  fetchPrice();
  setInterval(fetchPrice, 60000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }

})();
</script>
